# Font
font_family Agave Nerd Font Mono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 16

# Svart mörkt tema (Catppuccin Mocha)
background #1e1e2e
foreground #cdd6f4
selection_foreground #1e1e2e
selection_background #cba6f7
cursor #f5e0dc

# Tabs
tab_bar_style powerline
tab_bar_min_tabs 2
tab_title_template {index}

# Mouse
mouse_hide_wait 3

# Splits
enable_audio_bell no